<section class="auth-page">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h1>Registrácia</h1>
    <p>Vytvor si svoj účet.</p>

    <app-error-banner [message]="errorMessage" />

    <label for="display_name">Meno <span class="required-mark" aria-hidden="true">*</span></label>
    <input
      id="display_name"
      name="display_name"
      type="text"
      placeholder="Tvoje meno"
      autocomplete="name"
      formControlName="display_name"
    />

    <label for="register-email">Email <span class="required-mark" aria-hidden="true">*</span></label>
    <input
      id="register-email"
      name="email"
      type="email"
      placeholder="meno@firma.sk"
      autocomplete="email"
      formControlName="email"
    />

    <label for="register-password">Heslo <span class="required-mark" aria-hidden="true">*</span></label>
    <input
      id="register-password"
      name="password"
      type="password"
      placeholder="Zvoľ heslo"
      autocomplete="new-password"
      formControlName="password"
    />

    <label for="register-password-confirmation">
      Potvrdenie hesla <span class="required-mark" aria-hidden="true">*</span>
    </label>
    <input
      id="register-password-confirmation"
      name="passwordConfirmation"
      type="password"
      placeholder="Znova heslo"
      autocomplete="new-password"
      formControlName="passwordConfirmation"
    />

    <p *ngIf="isSubmitting" class="form-loading">Spracúvam...</p>

    <button type="submit" class="btn btn-primary w-full">
      {{ isSubmitting ? 'Registrujem...' : 'Registrovať sa' }}
    </button>

    <div class="social-auth">
      <button
        type="button"
        class="social-button google"
        (click)="registerWithGoogle()"
      >
        <span class="social-icon google" aria-label="Google">
          <svg viewBox="0 0 48 48" role="img" aria-label="Google">
            <path d="M24 20.5v7.4h10.3c-.4 2.4-2.6 7.1-10.3 7.1-6.2 0-11.3-5.1-11.3-11.4S17.8 12.2 24 12.2c3.5 0 5.8 1.5 7.1 2.8l4.8-4.7C32.8 7.5 28.8 5.8 24 5.8 14.8 5.8 7.3 13.3 7.3 22.6S14.8 39.4 24 39.4c10.4 0 12.9-7.3 12.9-10.9 0-.7-.1-1.2-.2-1.9H24z"/>
            <path d="M43.7 24.3c0-.7-.1-1.2-.2-1.9H24v7.4h10.3c-.5 2.4-2.6 7.1-10.3 7.1-6.2 0-11.3-5.1-11.3-11.4 0-6.3 5.1-11.4 11.3-11.4 3.5 0 5.8 1.5 7.1 2.8l4.8-4.7C32.8 7.5 28.8 5.8 24 5.8 14.8 5.8 7.3 13.3 7.3 22.6S14.8 39.4 24 39.4c10.4 0 12.9-7.3 12.9-10.9z"/>
            <path d="M10.3 16.3l6.1 4.5c1.7-3.4 5.1-5.8 7.6-5.8 3.5 0 5.8 1.5 7.1 2.8l4.8-4.7C32.8 7.5 28.8 5.8 24 5.8c-6.5 0-12.1 3.7-14.7 9.1z"/>
            <path d="M24 39.4c6.8 0 12.6-4.5 14.6-10.7l-7.1-5.5c-1.2 3.3-4.1 5.6-7.5 5.6-4.9 0-9-3.4-10.4-8.1l-6.4 4.9C10.3 33.8 16.6 39.4 24 39.4z"/>
          </svg>
        </span>
        cez Google
      </button>
      <button
        type="button"
        class="social-button facebook"
        (click)="registerWithFacebook()"
      >
        <span class="social-icon facebook" aria-label="Facebook">
          <svg viewBox="0 0 24 24" role="img" aria-label="Facebook">
            <path d="M22.7 12.1c0-5.9-4.8-10.7-10.7-10.7S1.3 6.2 1.3 12.1c0 5.3 3.9 9.7 9 10.6v-7.5H7.6v-3.1h2.7V9.6c0-2.7 1.6-4.2 4-4.2 1.2 0 2.4.2 2.4.2v2.6h-1.3c-1.3 0-1.7.8-1.7 1.6v1.9h2.9l-.5 3.1h-2.4v7.5c5.1-.9 9-5.3 9-10.6z"/>
          </svg>
        </span>
         cez Facebook
      </button>
    </div>

    <small>
      Už máš účet?
      <a routerLink="/login">Prihlás sa</a>
    </small>
  </form>
</section>
