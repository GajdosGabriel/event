<section class="edit-shell">
  <article class="edit-card">
    <app-page-head
      [title]="isEditMode() ? 'Úprava kanálu' : 'Nový kanál'"
      subtitle="Vyplň formulár a ulož kanál do zoznamu."
    >
      <a head-actions [routerLink]="routePrefix + '/canals'" class="head-link">Späť na kanály</a>
    </app-page-head>

    @if (loading()) {
      <p class="status">Načítavam kanál...</p>
    } @else {
      <app-error-banner
        [messages]="submitErrors()"
        [message]="submitErrors().length > 0 ? '' : errorMessage()"
      />

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
        <div class="grid">
          <app-entity-select
            label="Municipality"
            formControlName="municipality_id"
            [required]="true"
            [invalid]="isFieldInvalid('municipality_id')"
            [errorText]="getFieldError('municipality_id')"
            [options]="municipalityOptions()"
            placeholder="Vyhľadaj miesto"
          />

          <app-entity-select
            label="Sídlo"
            formControlName="venue_id"
            [options]="venueOptions()"
            placeholder="Vyhľadaj sídlo pôsobenia"
          />

          <label [class.invalid]="isFieldInvalid('name')">
            <span class="label-line"
              >Názov <span class="required-mark" aria-hidden="true">*</span></span
            >
            <input type="text" formControlName="name" />
            @if (isFieldInvalid('name')) {
              <small class="field-error">{{ getFieldError('name') }}</small>
            }
          </label>

          <app-entity-select
            label="Režim identity"
            formControlName="identity_mode"
            [required]="true"
            [invalid]="isFieldInvalid('identity_mode')"
            [errorText]="getFieldError('identity_mode')"
            [options]="identityModeOptions"
            placeholder="Vyber režim identity"
          />

          @if (isEditMode()) {
            <label [class.invalid]="isFieldInvalid('slug')">
              Slug
              <input type="text" formControlName="slug" />
              @if (isFieldInvalid('slug')) {
                <small class="field-error">{{ getFieldError('slug') }}</small>
              }
            </label>
          }

          <label [class.invalid]="isFieldInvalid('title_prefix')">
            Prefix
            <input type="text" formControlName="title_prefix" />
            @if (isFieldInvalid('title_prefix')) {
              <small class="field-error">{{ getFieldError('title_prefix') }}</small>
            }
          </label>

          <label [class.invalid]="isFieldInvalid('title_suffix')">
            Suffix
            <input type="text" formControlName="title_suffix" />
            @if (isFieldInvalid('title_suffix')) {
              <small class="field-error">{{ getFieldError('title_suffix') }}</small>
            }
          </label>

          <label [class.invalid]="isFieldInvalid('email')">
            <span class="label-line"
              >Email <span class="required-mark" aria-hidden="true">*</span></span
            >
            <input type="email" formControlName="email" />
            @if (isFieldInvalid('email')) {
              <small class="field-error">{{ getFieldError('email') }}</small>
            }
          </label>

          <app-entity-select
            label="Status"
            formControlName="status"
            [required]="true"
            [invalid]="isFieldInvalid('status')"
            [errorText]="getFieldError('status')"
            [options]="statusOptions()"
            placeholder="Vyber status"
          />

          <label [class.invalid]="isFieldInvalid('website')">
            Web
            <input type="url" formControlName="website" />
            @if (isFieldInvalid('website')) {
              <small class="field-error">{{ getFieldError('website') }}</small>
            }
          </label>

          <label class="full" [class.invalid]="isFieldInvalid('body')">
            <span class="label-line"
              >Popis <span class="required-mark" aria-hidden="true">*</span></span
            >
            <textarea rows="5" formControlName="body"></textarea>
            @if (isFieldInvalid('body')) {
              <small class="field-error">{{ getFieldError('body') }}</small>
            }
          </label>
        </div>

        <app-uploaded-files-list
          title="Súbory ku kanálu"
          [files]="existingUploadedFiles()"
          emptyText="Zatiaľ nie sú žiadne súbory ani pripravené uploady."
          [showRemoveAction]="true"
          [showUploadInput]="canUploadFiles"
          [canSavePending]="isEditMode() && canalId() !== null"
          pendingSaveUnavailableText="Súbory sa uložia po vytvorení kanála."
          savePendingLabel="Uložiť"
          [savePendingDisabled]="saving() || filesValidationError() !== ''"
          [pendingResetKey]="uploadedFilesResetKey()"
          (fileRemoved)="onRemoveUploadedFile($event)"
          (filePrimarySet)="onPrimaryUploadedFile($event)"
          (selectionChange)="onFilesSelectionChange($event)"
          (validationError)="onFilesValidationError($event)"
          (savePendingRequested)="onSavePendingFiles()"
        />

        <button type="submit" class="btn btn-primary" [disabled]="saving()">
          {{ saving() ? 'Ukladám...' : isEditMode() ? 'Uložiť zmeny' : 'Vytvoriť kanál' }}
        </button>
      </form>
    }
  </article>
</section>
