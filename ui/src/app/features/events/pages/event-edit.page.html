<section class="edit-shell">
  <article class="edit-card">
    <app-page-head
      [title]="isEditMode() ? 'Úprava podujatia' : 'Vytvoriť podujatie'"
      subtitle="Vyplnené podujatie sa uloží do zoznamu podujatí."
    >
      <a head-actions routerLink="/dashboard/events" class="head-link">Späť na zoznam podujatí</a>
    </app-page-head>

    @if (loading()) {
      <p class="status">Načítavam podujatia...</p>
    } @else {
      <app-error-banner
        [messages]="submitErrors()"
        [message]="submitErrors().length > 0 ? '' : errorMessage()"
      />

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form">
        <label [class.invalid]="isFieldInvalid('name')">
          <span class="label-line"
            >Názov <span class="required-mark" aria-hidden="true">*</span></span
          >
          <input type="text" formControlName="name" />
          @if (isFieldInvalid('name')) {
            <small class="field-error">{{ getFieldError('name') }}</small>
          }
        </label>

        <label [class.invalid]="isFieldInvalid('body')">
          <span class="label-line">Popis</span>
          <app-rich-text-editor formControlName="body" />
          @if (isFieldInvalid('body')) {
            <small class="field-error">{{ getFieldError('body') }}</small>
          }
        </label>

        <div class="grid">
          <app-entity-select
            label="Kanál"
            formControlName="canal_id"
            [invalid]="isFieldInvalid('canal_id')"
            [errorText]="getFieldError('canal_id')"
            [options]="canalOptions()"
            placeholder="Vyber kanál"
          />

          <div class="venue-field-wrap">
            <app-entity-select
              label="Miesto konania"
              formControlName="venue_id"
              [options]="venueOptions()"
              placeholder="Vyhľadaj miesto konania"
            />
            @if (!form.controls['venue_id'].value) {
              <button
                type="button"
                class="field-action-link venue-field-action"
                (click)="openNewVenueDialog()"
              >
                Nový
              </button>
            }
          </div>

          @if (isSuperAdmin()) {
            <app-entity-select
              label="Status"
              formControlName="status"
              [invalid]="isFieldInvalid('status')"
              [errorText]="getFieldError('status')"
              [options]="statusOptions()"
              placeholder="Vyber status"
            />
          }

          <div class="flex gap-4">
            <label [class.invalid]="isFieldInvalid('start_date')" class="flex-1">
              <span class="label-line">Začiatok dátum<span class="required-mark" aria-hidden="true">*</span></span>
              <input type="date" formControlName="start_date" />
              @if (isFieldInvalid('start_date')) {
                <small class="field-error">{{ getFieldError('start_date') }}</small>
              }
            </label>
            <label [class.invalid]="isFieldInvalid('start_time')" class="flex-1">
              <span class="label-line">Začiatok čas<span class="required-mark" aria-hidden="true">*</span></span>
              <input type="time" formControlName="start_time" />
              @if (isFieldInvalid('start_time')) {
                <small class="field-error">{{ getFieldError('start_time') }}</small>
              }
            </label>
          </div>

          <div class="flex gap-4">
            <label [class.invalid]="isFieldInvalid('end_date')" class="flex-1">
              <span class="label-line">Koniec dátum<span class="required-mark" aria-hidden="true">*</span></span>
              <input type="date" formControlName="end_date" />
              @if (isFieldInvalid('end_date')) {
                <small class="field-error">{{ getFieldError('end_date') }}</small>
              }
            </label>

            <label [class.invalid]="isFieldInvalid('end_time')" class="flex-1">
              <span class="label-line">Koniec čas<span class="required-mark" aria-hidden="true">*</span></span>
              <input type="time" formControlName="end_time" />
              @if (isFieldInvalid('end_time')) {
                <small class="field-error">{{ getFieldError('end_time') }}</small>
              }
            </label>
          </div>

          <div class="flex gap-4">
            <label [class.invalid]="isFieldInvalid('registration_deadline_date')" class="flex-1">
              Uzávierka prihlásení dátum
              <input type="date" formControlName="registration_deadline_date" />
              @if (isFieldInvalid('registration_deadline_date')) {
                <small class="field-error">{{ getFieldError('registration_deadline_date') }}</small>
              }
            </label>
            <label [class.invalid]="isFieldInvalid('registration_deadline_time')" class="flex-1">
              Uzávierka prihlásení čas
              <input type="time" formControlName="registration_deadline_time" />
              @if (isFieldInvalid('registration_deadline_time')) {
                <small class="field-error">{{ getFieldError('registration_deadline_time') }}</small>
              }
            </label>
          </div>

          <div class="flex gap-4">
            <label [class.invalid]="isFieldInvalid('website')" class="flex-1">
              Web
              <input type="url" formControlName="website" />
              @if (isFieldInvalid('website')) {
                <small class="field-error">{{ getFieldError('website') }}</small>
              }
            </label>
          </div>
        </div>

        <app-uploaded-files-list
          title="Súbory k podujatiu"
          [files]="existingUploadedFiles()"
          emptyText="Zatiaľ nie sú žiadne súbory ani pripravené uploady."
          [showRemoveAction]="true"
          [showUploadInput]="canUploadFiles"
          [canSavePending]="isEditMode() && eventId() !== null"
          pendingSaveUnavailableText="Súbory sa uložia po vytvorení podujatia."
          savePendingLabel="Uložiť"
          [savePendingDisabled]="saving() || filesValidationError() !== ''"
          [pendingResetKey]="uploadedFilesResetKey()"
          (fileRemoved)="onRemoveUploadedFile($event)"
          (filePrimarySet)="onPrimaryUploadedFile($event)"
          (selectionChange)="onFilesSelectionChange($event)"
          (validationError)="onFilesValidationError($event)"
          (savePendingRequested)="onSavePendingFiles()"
        />

        <button type="submit" class="btn btn-primary" [disabled]="saving()">
          {{ saving() ? 'Ukladám...' : isEditMode() ? 'Uložiť zmeny' : 'Vytvoriť podujatie' }}
        </button>
      </form>
    }
  </article>
</section>

@if (newVenueDialogOpen()) {
  <div class="dialog-backdrop" (click)="closeNewVenueDialog()">
    <div
      class="dialog-panel"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      aria-labelledby="new-venue-title"
    >
      <div class="dialog-head">
        <h2 id="new-venue-title" class="dialog-title">Nové miesto konania</h2>
        <button
          type="button"
          class="dialog-close"
          (click)="closeNewVenueDialog()"
          aria-label="Zavrieť"
        >
          ✕
        </button>
      </div>

      <form [formGroup]="newVenueForm" (ngSubmit)="onSaveNewVenue()" class="dialog-form">
        <label
          class="grid gap-1 text-sm font-medium text-slate-700"
          [class.invalid]="isNewVenueFieldInvalid('name')"
        >
          <span class="label-line"
            >Názov <span class="required-mark" aria-hidden="true">*</span></span
          >
          <input
            type="text"
            formControlName="name"
            class="rounded-lg border border-slate-300 px-3 py-2 text-slate-900 outline-none ring-blue-500 focus:ring"
          />
          @if (isNewVenueFieldInvalid('name')) {
            <small class="field-error">Toto pole je povinné.</small>
          }
        </label>

        <app-entity-select
          label="Obec *"
          formControlName="village_id"
          [invalid]="isNewVenueFieldInvalid('village_id')"
          errorText="Toto pole je povinné."
          [options]="municipalityOptions()"
          placeholder="Vyhľadaj obec"
        />

        <label class="grid gap-1 text-sm font-medium text-slate-700">
          Ulica
          <input
            type="text"
            formControlName="street"
            class="rounded-lg border border-slate-300 px-3 py-2 text-slate-900 outline-none ring-blue-500 focus:ring"
          />
        </label>

        <label class="grid gap-1 text-sm font-medium text-slate-700">
          PSČ
          <input
            type="text"
            formControlName="postcode"
            class="rounded-lg border border-slate-300 px-3 py-2 text-slate-900 outline-none ring-blue-500 focus:ring"
          />
        </label>

        <div class="dialog-actions">
          <button type="button" class="btn btn-secondary" (click)="closeNewVenueDialog()">
            Zrušiť
          </button>
          <button type="submit" class="btn btn-primary" [disabled]="newVenueSaving()">
            {{ newVenueSaving() ? 'Ukladám...' : 'Uložiť' }}
          </button>
        </div>
      </form>
    </div>
  </div>
}
