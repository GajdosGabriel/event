<div class="grid gap-6 lg:grid-cols-3">
  <main class="flex flex-col gap-4 lg:col-span-2">
    <app-index-shell title="Miesta" [defaultPerPage]="defaultPerPage()" [perPageLoading]="defaultPerPageLoading()">
      @if (canCreate()) {
        <a index-actions [routerLink]="routePrefix + '/venues/create'" class="head-link">Vytvoriť miesto</a>
      }

      @if (loading()) {
        <p class="index-status">Načítavam miesta...</p>
      } @else {
        <app-error-banner [message]="errorMessage()" />

        @if (venues().length === 0) {
          <p class="index-status">Žiadne miesta.</p>
        } @else {
          <ul class="index-list">
            @for (venue of venues(); track venue.id) {
              <app-index-item
                [itemId]="venue.id"
                [title]="venue.name"
                [description]="venue.body"
                [descriptionFallback]="'Bez popisu miesta.'"
                [status]="venue.status"
                [metaItems]="getMetaItems(venue)"
                [thumbImage]="venue.imageUrl"
                [deletedAt]="venue.deletedAt"
                [link]="routePrefix + '/venues/' + venue.id"
                [editLink]="routePrefix + '/venues/' + venue.id + '/edit'"
                [permissions]="venue.permissions"
                [showViewAction]="true"
                [showStatusAction]="true"
                [detailAriaLabel]="'Zobraziť detail miesta'"
                [deletedItemMessage]="'Miesto je zmazané. Obnovte ho pre zobrazenie detailu.'"
                (actionClicked)="onVenueAction($event, venue)"
              ></app-index-item>
            }
          </ul>
        }
      }
    </app-index-shell>

    <app-paginator
      [currentPage]="currentPage()"
      [totalPages]="totalPages()"
      (pageChange)="onPageChange($event)"
    />
  </main>

  <aside class="lg:col-span-1">
    <div class="panel-card">
      <app-municipality-overview
        title="Regióny"
        allLabel="Všetky miesta"
        [allLink]="routePrefix + '/venues'"
        [scope]="venuesScope"
        resource="venues"
        [limit]="8"
      />
    </div>
  </aside>
</div>
