<div class="toast-container" *ngIf="toasts$ | async as toasts">
  <button
    *ngIf="toasts.length > 1"
    type="button"
    class="toast-clear"
    (click)="clear()"
  >
    Zatvorit vsetko
  </button>
  <div
    *ngFor="let toast of toasts"
    class="toast"
    [attr.data-type]="toast.type"
    [class.toast-leaving]="toast.state === 'leaving'"
    [class.toast-paused]="toast.paused"
    [class.toast-sticky]="toast.durationMs === 0"
    (click)="dismissIfClickable(toast.id, $event)"
    (mouseenter)="pause(toast.id)"
    (mouseleave)="resume(toast.id)"
  >
    <span
      *ngIf="toast.durationMs === 0"
      class="toast-pin"
      aria-hidden="true"
      title="Sticky"
    >
      PIN
    </span>
    <span class="toast-message">{{ toast.message }}</span>
    <button type="button" class="toast-close" (click)="dismiss(toast.id)">×</button>
    <span
      *ngIf="toast.durationMs > 0"
      class="toast-progress"
      [style.--toast-duration]="toast.remainingMs + 'ms'"
    ></span>
  </div>
</div>
