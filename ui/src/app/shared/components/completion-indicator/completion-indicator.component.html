<div
  class="completion-indicator-track"
  role="progressbar"
  [attr.aria-valuenow]="percent()"
  aria-valuemin="0"
  aria-valuemax="100"
  [attr.aria-label]="label() + ' ' + percent() + '%'"
>
  <div
    class="completion-indicator-fill"
    [class.fill-low]="percent() < 40"
    [class.fill-mid]="percent() >= 40 && percent() < 80"
    [class.fill-high]="percent() >= 80"
    [style.width.%]="percent()"
  ></div>
</div>
